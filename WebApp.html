<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mCoin WebApp - Кейсы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            user-select: none;
        }
        h1 { color: #00f2fe; text-shadow: 0 0 10px #00f2fe; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #8a8a9e; font-size: 14px; margin-bottom: 30px; }
        
        .cases-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .case-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 242, 254, 0.2);
            border-radius: 16px;
            padding: 20px;
            width: 140px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.2s, border-color 0.2s;
        }
        .case-card:active { transform: scale(0.95); }
        .case-card.epic { border-color: #9b51e0; }
        
        .case-icon { font-size: 50px; margin-bottom: 10px; display: inline-block; animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .case-title { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .case-price { color: #ffd700; font-size: 13px; font-weight: bold; }
        
        .btn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: none; color: white; padding: 10px 15px; border-radius: 8px;
            margin-top: 15px; cursor: pointer; font-weight: bold; width: 100%;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
        }
        .case-card.epic .btn { background: linear-gradient(45deg, #9b51e0, #e056fd); box-shadow: 0 4px 15px rgba(155, 81, 224, 0.4); }

        /* Анімація відкриття */
        #roulette-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 26, 0.95); z-index: 100; align-items: center; justify-content: center; flex-direction: column;
        }
        .spinner {
            width: 80px; height: 80px; border: 8px solid rgba(0,242,254,0.1); border-left-color: #00f2fe;
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #win-box { display: none; font-size: 22px; font-weight: bold; color: #ffd700; text-shadow: 0 0 15px rgba(255,215,0,0.6); animation: pulse 0.5s infinite alternate; }
    </style>
</head>
<body>

    <h1>💎 mCoin Web3 Лутбоксы</h1>
    <div class="subtitle">Открывай кейсы и выбивай mCoin или рефералов!</div>

    <div class="cases-container">
        <div class="case-card" onclick="openCase('common')">
            <div class="case-icon">📦</div>
            <div class="case-title">Обычный</div>
            <div class="case-price">5,000 mCoin</div>
            <button class="btn">Открыть</button>
        </div>

        <div class="case-card epic" onclick="openCase('epic')">
            <div class="case-icon">👑</div>
            <div class="case-title">Эпический</div>
            <div class="case-price">50 Stars ⭐️</div>
            <button class="btn">Открыть</button>
        </div>
    </div>

    <div id="roulette-overlay">
        <div id="loading-state">
            <div class="spinner"></div>
            <div style="font-size: 18px; color: #00f2fe;">Генерация лута...</div>
        </div>
        <div id="win-box"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function openCase(type) {
            document.getElementById('roulette-overlay').style.display = 'flex';
            document.getElementById('loading-state').style.display = 'block';
            document.getElementById('win-box').style.display = 'none';

            // Надсилаємо боту сигнал, який кейс вибрав юзер
            setTimeout(() => {
                tg.sendData(JSON.stringify({action: "open_case", case_type: type}));
                
                // Емуляція гарного ефекту на екрані перед закриттям
                document.getElementById('loading-state').style.display = 'none';
                const winBox = document.getElementById('win-box');
                winBox.style.display = 'block';
                winBox.innerHTML = type === 'common' ? "🎉 Успешно отправлено боту!" : "⭐️ Запрос на оплату Stars...";
                
                setTimeout(() => {
                    tg.close();
                }, 1500);
            }, 2000);
        }
    </script>
</body>
</html>
